name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_once.outputs.page_url || steps.deploy_retry.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deploy_once
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - id: deploy_retry
        if: steps.deploy_once.outcome == 'failure'
        uses: actions/deploy-pages@v5
